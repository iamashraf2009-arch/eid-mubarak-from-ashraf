<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eid Mubarak</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
}

/* 🎥 Background Video */
#bg-video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
}

/* 📦 Content */
.container {
  text-align: center;
  z-index: 1;
}

/* 🖼️ Eid PNG */
.eid-img {
  width: 500px;
  display: block;
  margin: 0 auto 5px auto;
}

/* 🔼 TO text */
.to-text {
  font-size: 40px;
  font-weight: bold;
  color: #ffffff;
  margin-bottom: 5px;
  text-shadow: 0 0 20px black;
}

/* 📦 NAME BOX (FULLY CUSTOMIZABLE 🔥) */
.name-box {
  display: inline-block;
  padding: 15px 40px;              /* 📏 box size */
  border: 5px solid #ffffff;       /* 🧱 border color */
  border-radius: 15px;             /* 🔘 roundness */
  background: rgba(0, 0, 15, 0.993);  /* 🎨 background */
  backdrop-filter: blur(20px);      /* ✨ glass effect */
  box-shadow: 0 0 20px rgba(238, 202, 0, 0.849); /* 💡 glow */
}

/* 🧑 Name */
.name {
  font-size: 60px;
  font-weight: bold;
  color: gold;
  margin: 0;
  text-shadow: 0 0 10px black;
}

/* 🔽 FROM text */
.from-text {
  font-size: 40px;
  font-weight: bold;
  color: #ffffff;
  margin-top: 10px;
  text-shadow: 0 0 20px black;
}
</style>
</head>

<body>

<!-- 🎥 Background Video -->
<video autoplay muted loop playsinline id="bg-video">
  <source src="your-video.mp4" type="video/mp4">
</video>

<div class="container">
  
  <!-- 🖼️ PNG -->
  <img src="your-eid-text.png" class="eid-img">

  <!-- 🔊 Audio -->
  <audio id="music" src="your-audio.mp3" loop></audio>

  <script>
    const music = document.getElementById("music");
    document.body.addEventListener("click", () => {
      music.play();
    }, { once: true });
  </script>

  <!-- 🔼 TO -->
  <div class="to-text">To</div>

  <!-- 📦 NAME BOX -->
  <div class="name-box">
    <div class="name" id="username"></div>
  </div>

  <!-- 🔽 FROM -->
  <div class="from-text">From Ashraf 😊</div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const name = params.get("name");

document.getElementById("username").innerText = name || "Eid Mubarak";
</script>

</body>
</html>
